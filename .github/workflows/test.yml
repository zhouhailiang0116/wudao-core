name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run axiom tests
        run: |
          # Debug: show repo structure
          pwd && ls -la && ls wukong/ 2>/dev/null || echo "wukong/ missing"
          # Create wukong/memory if missing (required by axiom8_causal.py path layout)
          mkdir -p wukong/memory
          echo "After mkdir:" && ls wukong/
          python3 axioms/tests/test_axioms.py 2>&1
